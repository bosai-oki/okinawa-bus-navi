<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沖縄バスナビ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-down {
      animation: slideDown 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-cyan-50 min-h-screen">
  <div id="app"></div>

  <script>
    // ==========================================
    // データ定義
    // ==========================================
    const BUS_STOPS = [
      '安謝（国道58号線）',
      '沖縄県庁北口',
      '県庁前',
      '那覇バスターミナル',
      '牧志',
      'おもろまち駅前',
      '古島駅前',
      '首里駅前',
      '国際通り',
      '美栄橋駅前'
    ];

    const ROUTE_DATA = {
      '安謝（国道58号線）_沖縄県庁北口': [
        {
          id: 1,
          routeNumber: '20番',
          routeName: '名護西線',
          company: '琉球バス',
          duration: 12,
          fare: '240円',
          stops: ['安謝（国道58号線）', '泊高橋', '上泊', '沖縄県庁北口'],
          minutesToArrival: 3,
          busnavi_url: 'https://www.busnavi-okinawa.com/'
        },
        {
          id: 2,
          routeNumber: '120番',
          routeName: '名護西空港線',
          company: '琉球バス',
          duration: 12,
          fare: '240円',
          stops: ['安謝（国道58号線）', '泊高橋', '上泊', '沖縄県庁北口'],
          minutesToArrival: 8,
          busnavi_url: 'https://www.busnavi-okinawa.com/'
        },
        {
          id: 3,
          routeNumber: '28番',
          routeName: '読谷線（遠回り）',
          company: '琉球バス',
          duration: 28,
          fare: '240円',
          stops: ['安謝（国道58号線）', 'おもろまち駅前', '新都心', '牧志', '国際通り', '美栄橋', '沖縄県庁北口'],
          minutesToArrival: 5,
          busnavi_url: 'https://www.busnavi-okinawa.com/'
        },
        {
          id: 4,
          routeNumber: '43番',
          routeName: '北谷線',
          company: '沖縄バス',
          duration: 15,
          fare: '240円',
          stops: ['安謝（国道58号線）', '泊高橋', '上泊', '沖縄県庁北口'],
          minutesToArrival: 12,
          busnavi_url: 'https://www.busnavi-okinawa.com/'
        }
      ]
    };

    // ==========================================
    // 状態管理
    // ==========================================
    let state = {
      from: '',
      to: '',
      results: null,
      routes: [],
      expandedId: null,
      currentTime: new Date()
    };

    // ==========================================
    // ユーティリティ関数
    // ==========================================
    function formatTime(date) {
      return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function getArrivalTime(minutesToBus, duration) {
      const d = new Date(state.currentTime.getTime() + (minutesToBus + duration) * 60000);
      return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function getArrivalText(minutes) {
      if (minutes < 0.5) return '今すぐ乗れます！';
      if (minutes < 2) return '約1分後';
      return `約${Math.ceil(minutes)}分後`;
    }

    // ==========================================
    // イベントハンドラ
    // ==========================================
    function handleSearch() {
      if (!state.from || !state.to) {
        alert('出発地と目的地を選んでください');
        return;
      }
      const key = `${state.from}_${state.to}`;
      const found = ROUTE_DATA[key] || [];
      const sorted = [...found].sort((a, b) => a.minutesToArrival - b.minutesToArrival);
      
      state.routes = sorted;
      state.results = sorted;
      state.expandedId = null;
      render();
    }

    function toggleExpanded(id) {
      state.expandedId = state.expandedId === id ? null : id;
      render();
    }

    // ==========================================
    // レンダリング
    // ==========================================
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="max-w-lg mx-auto p-4">
          
          <!-- ヘッダー -->
          <div class="bg-gradient-to-r from-blue-600 to-cyan-600 rounded-2xl shadow-lg p-6 mb-6 text-white">
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
              </svg>
              <div>
                <h1 class="text-2xl font-bold">沖縄バスナビ</h1>
                <p class="text-blue-100 text-sm">次に乗れるバスを自動で探します</p>
              </div>
            </div>
            <div class="mt-3 text-sm text-blue-100 flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
              ${formatTime(state.currentTime)}
            </div>
          </div>

          <!-- 検索フォーム -->
          <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            
            <div class="mb-4">
              <label class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                今いる場所（出発地）
              </label>
              <select 
                id="from-select"
                onchange="state.from = this.value"
                class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none"
              >
                <option value="">バス停を選んでください</option>
                ${BUS_STOPS.map(s => `<option value="${s}" ${state.from === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </div>

            <div class="flex justify-center my-2">
              <div class="bg-gray-100 rounded-full p-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </div>
            </div>

            <div class="mb-6">
              <label class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                行きたい場所（目的地）
              </label>
              <select 
                id="to-select"
                onchange="state.to = this.value"
                class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none"
              >
                <option value="">バス停を選んでください</option>
                ${BUS_STOPS.map(s => `<option value="${s}" ${state.to === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </div>

            <button
              onclick="handleSearch()"
              class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-bold py-4 rounded-xl text-lg flex items-center justify-center gap-2 shadow-md hover:shadow-lg active:scale-95 transition-all"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              今乗れるバスを探す
            </button>
          </div>

          ${state.results !== null ? renderResults() : ''}

          <!-- フッター -->
          <div class="mt-8 text-center text-xs text-gray-400 pb-4">
            <p>※ 現在はデモデータを使用しています</p>
            <p>GTFSデータ取得後に実際の時刻表に切り替えます</p>
          </div>
        </div>
      `;
    }

    function renderResults() {
      if (state.routes.length === 0) {
        return `
          <div class="bg-white rounded-2xl shadow p-4 animate-slide-down">
            <p class="text-gray-700 font-bold">${state.from} → ${state.to}</p>
            <p class="text-gray-500 text-sm mt-1">このルートのバスが見つかりませんでした</p>
          </div>
        `;
      }

      return `
        <div class="space-y-4 animate-slide-down">
          <div class="bg-white rounded-2xl shadow p-4">
            <p class="text-gray-700 font-bold">${state.from} → ${state.to}</p>
            <div class="flex items-center gap-2 mt-1 text-blue-600">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/>
              </svg>
              <span class="text-sm font-semibold">${state.routes.length}本のバスが見つかりました</span>
            </div>
          </div>

          ${state.routes.map((route, index) => renderRoute(route, index)).join('')}
        </div>
      `;
    }

    function renderRoute(route, index) {
      const isFirst = index === 0;
      const arrivalTime = getArrivalTime(route.minutesToArrival, route.duration);
      const isDetour = route.stops.length > 5;
      const isExpanded = state.expandedId === route.id;

      return `
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden ${isFirst ? 'ring-4 ring-yellow-400' : ''}">
          
          ${isFirst ? `
            <div class="bg-gradient-to-r from-yellow-400 to-orange-400 px-4 py-2 flex items-center gap-2">
              <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
              <span class="text-white font-bold text-sm">おすすめ！最速で乗れるバス</span>
            </div>
          ` : ''}

          ${isDetour ? `
            <div class="bg-orange-50 border-b border-orange-200 px-4 py-2 flex items-center gap-2">
              <span class="text-orange-600 text-sm font-semibold">⚠️ このバスは遠回りです（${route.stops.length}停留所経由）</span>
            </div>
          ` : ''}

          <div class="p-5">
            
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xl shadow">
                  ${route.routeNumber}
                </div>
                <div>
                  <div class="font-bold text-gray-800">${route.routeName}</div>
                  <div class="text-xs text-gray-500">${route.company}</div>
                </div>
              </div>
              <div class="text-right">
                <div class="font-bold text-blue-600 text-lg">${route.fare}</div>
                <div class="text-xs text-gray-500">${route.duration}分</div>
              </div>
            </div>

            <div class="rounded-xl p-4 mb-4 ${isFirst ? 'bg-yellow-50 border-2 border-yellow-300' : 'bg-blue-50'}">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <div class="text-xs text-gray-500 mb-1 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                    </svg>
                    バスが来るまで
                  </div>
                  <div class="text-xl font-bold ${isFirst ? 'text-orange-500' : 'text-blue-600'}">
                    ${getArrivalText(route.minutesToArrival)}
                  </div>
                </div>
                <div>
                  <div class="text-xs text-gray-500 mb-1 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                    </svg>
                    目的地に着く時刻
                  </div>
                  <div class="text-xl font-bold ${isFirst ? 'text-orange-500' : 'text-blue-600'}">
                    ${arrivalTime}
                  </div>
                </div>
              </div>
              <div class="mt-3 bg-gray-200 rounded-full h-1.5">
                <div class="${isFirst ? 'bg-orange-400' : 'bg-blue-500'} h-1.5 rounded-full transition-all" style="width: ${Math.min(100, Math.max(5, 100 - (route.minutesToArrival / 15 * 100)))}%"></div>
              </div>
            </div>

            <a href="${route.busnavi_url}" target="_blank" class="w-full flex items-center justify-center gap-2 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-3 rounded-xl mb-3 transition-colors border border-green-200">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              </svg>
              リアルタイム位置を見る
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>

            <button onclick="toggleExpanded(${route.id})" class="w-full flex items-center justify-center gap-2 text-gray-500 hover:text-gray-700 text-sm py-2">
              ${isExpanded ? 
                `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>` : 
                `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>`
              }
              経由バス停を確認する（${route.stops.length}停留所）
            </button>

            ${isExpanded ? `
              <div class="mt-3 pt-3 border-t border-gray-100">
                ${route.stops.map((stop, idx) => `
                  <div class="flex items-start gap-3 mb-1">
                    <div class="flex flex-col items-center pt-1">
                      <div class="w-3 h-3 rounded-full flex-shrink-0 ${
                        idx === 0 ? 'bg-green-500' :
                        idx === route.stops.length - 1 ? 'bg-red-500' : 'bg-gray-300'
                      }"></div>
                      ${idx < route.stops.length - 1 ? '<div class="w-0.5 h-5 bg-gray-200 mt-0.5"></div>' : ''}
                    </div>
                    <div class="pb-1 text-sm ${
                      idx === 0 || idx === route.stops.length - 1 ? 'font-bold text-gray-800' : 'text-gray-500'
                    }">
                      ${stop}
                    </div>
                  </div>
                `).join('')}
                ${isDetour ? `
                  <div class="mt-2 bg-orange-50 rounded-lg p-3 text-sm text-orange-700">
                    ⚠️ 遠回りのため所要時間が長くなります
                  </div>
                ` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ==========================================
    // 初期化
    // ==========================================
    setInterval(() => {
      state.currentTime = new Date();
      if (state.routes.length > 0) {
        state.routes = state.routes.map(r => ({
          ...r,
          minutesToArrival: Math.max(0, r.minutesToArrival - 1/60)
        }));
      }
      render();
    }, 1000);

    render();
  </script>
</body>
</html>
