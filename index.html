      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      
      const times = timetable[dayType];
      for (let entry of times) {
        const [h, m] = entry.time.split(':').map(Number);
        const depMinutes = h * 60 + m;
        if (depMinutes > currentMinutes) {
          const diff = depMinutes - currentMinutes;
          return { time: entry.time, arrival: entry.arrival, minutesUntil: diff, dayType };
        }
      }
      
      // 本日の便がない場合
      const lastEntry = times[times.length - 1];
      return { time: lastEntry.time, arrival: lastEntry.arrival, minutesUntil: -1, dayType };
    }

    function getArrivalText(minutes) {
      if (minutes < 0) return '本日の運行終了';
      if (minutes < 1) return '今すぐ乗れます！';
      if (minutes < 3) return `約${minutes}分後`;
      return `約${minutes}分後`;
    }

    // ==========================================
    // イベントハンドラ
    // ==========================================
    function handleSearch() {
      if (!state.from || !state.to) {
        alert('出発地と目的地を選んでください');
        return;
      }
      
      if (state.from === state.to) {
        alert('出発地と目的地は異なる場所を選んでください');
        return;
      }
      
      const fromStop = BUS_DATA.stops.find(s => s.id === state.from);
      const toStop = BUS_DATA.stops.find(s => s.id === state.to);
      
      const key = `${fromStop.name}→${toStop.name}`;
      const routeData = BUS_DATA.routes[key];
      
      if (!routeData || Object.keys(routeData).length === 0) {
        state.results = [];
        state.routes = [];
        state.minStops = 0;
      } else {
        // 各路線の次の便を計算
        const routes = [];
        for (let [routeKey, route] of Object.entries(routeData)) {
          const next = getNextDeparture(route, state.dayType);
          routes.push({
            id: routeKey,
            ...route,
            nextDeparture: next.time,
            nextArrival: next.arrival,
            minutesToArrival: next.minutesUntil,
            activeDayType: next.dayType
          });
        }
        
        // 最短ルート（最少停留所数）を計算
        const minStops = Math.min(...routes.map(r => r.stops ? r.stops.length : 999));
        state.minStops = minStops;
        
        // 次の便が近い順にソート
        const sorted = routes.sort((a, b) => {
          if (a.minutesToArrival < 0) return 1;
          if (b.minutesToArrival < 0) return -1;
          return a.minutesToArrival - b.minutesToArrival;
        });
        
        state.routes = sorted;
        state.results = sorted;
      }
      
      state.expandedId = null;
      render();
    }

    function toggleExpanded(id) {
      state.expandedId = state.expandedId === id ? null : id;
      render();
    }

    // ==========================================
    // レンダリング
    // ==========================================
    function render() {
      const app = document.getElementById('app');
      
      const fromStop = BUS_DATA.stops.find(s => s.id === state.from);
      const toStop = BUS_DATA.stops.find(s => s.id === state.to);
      
      app.innerHTML = `
        <div class="max-w-lg mx-auto p-4">
          
          <!-- ヘッダー -->
          <div class="bg-gradient-to-r from-blue-600 to-cyan-600 rounded-2xl shadow-lg p-6 mb-6 text-white">
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
              </svg>
              <div>
                <h1 class="text-2xl font-bold">沖縄バスナビ</h1>
                <p class="text-blue-100 text-sm">実データ完全版（東陽・沖縄バス）</p>
              </div>
            </div>
            <div class="mt-3 flex items-center justify-between">
              <div class="text-sm text-blue-100 flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                ${formatTime(state.currentTime)}
              </div>
              <div class="text-sm bg-blue-500/30 px-3 py-1 rounded-full">
                ${getDayTypeLabel(state.dayType)}ダイヤ
              </div>
            </div>
          </div>

          <!-- 検索フォーム -->
          <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            
            <div class="mb-4">
              <label class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                今いる場所（出発地）
              </label>
              <select 
                id="from-select"
                onchange="state.from = this.value; render();"
                class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none"
              >
                <option value="">バス停を選んでください</option>
                ${BUS_DATA.stops.map(s => `<option value="${s.id}" ${state.from === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
              </select>
            </div>

            <div class="flex justify-center my-2">
              <div class="bg-gray-100 rounded-full p-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </div>
            </div>

            <div class="mb-6">
              <label class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                行きたい場所（目的地）
              </label>
              <select 
                id="to-select"
                onchange="state.to = this.value; render();"
                class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none"
              >
                <option value="">バス停を選んでください</option>
                ${BUS_DATA.stops.map(s => `<option value="${s.id}" ${state.to === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
              </select>
            </div>

            <button
              onclick="handleSearch()"
              class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-bold py-4 rounded-xl text-lg flex items-center justify-center gap-2 shadow-md hover:shadow-lg active:scale-95 transition-all"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              バスを検索
            </button>
          </div>

          ${state.results !== null ? renderResults() : ''}

          <!-- データクレジット -->
          <div class="mt-8 bg-white rounded-xl p-4 text-xs text-gray-500">
            <p class="font-bold mb-2">📊 使用データ</p>
            <p class="mb-1">このアプリは以下のGTFSオープンデータを使用しています：</p>
            <ul class="list-disc list-inside ml-2 space-y-1">
              <li>東陽バス（株）- OTTOP提供</li>
              <li>沖縄バス（株）- OTTOP提供</li>
            </ul>
            <p class="mt-2 text-gray-400">
              データ提供：<a href="https://www.ottop.org/" target="_blank" class="text-blue-500 hover:underline">特定非営利活動法人OTTOP</a><br>
              ライセンス：<a href="https://creativecommons.org/licenses/by/4.0/deed.ja" target="_blank" class="text-blue-500 hover:underline">CC BY 4.0</a>
            </p>
            <p class="mt-2 text-xs text-gray-400">
              生成日時: ${BUS_DATA.generated_at ? new Date(BUS_DATA.generated_at).toLocaleString('ja-JP') : '-'}
            </p>
          </div>
        </div>
      `;
    }

    function renderResults() {
      if (state.routes.length === 0) {
        const fromStop = BUS_DATA.stops.find(s => s.id === state.from);
        const toStop = BUS_DATA.stops.find(s => s.id === state.to);
        return `
          <div class="bg-white rounded-2xl shadow p-4 animate-slide-down">
            <p class="text-gray-700 font-bold">${fromStop?.name} → ${toStop?.name}</p>
            <p class="text-gray-500 text-sm mt-1">このルートのバスデータが見つかりませんでした</p>
            <p class="text-xs text-gray-400 mt-2">※ 現在は主要バス停間のルートのみ対応しています</p>
          </div>
        `;
      }

      const fromStop = BUS_DATA.stops.find(s => s.id === state.from);
      const toStop = BUS_DATA.stops.find(s => s.id === state.to);

      return `
        <div class="space-y-4 animate-slide-down">
          <div class="bg-white rounded-2xl shadow p-4">
            <p class="text-gray-700 font-bold">${fromStop?.name} → ${toStop?.name}</p>
            <div class="flex items-center gap-2 mt-1 text-blue-600">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/>
              </svg>
              <span class="text-sm font-semibold">${state.routes.length}路線が見つかりました</span>
            </div>
            ${state.minStops > 0 ? `
              <div class="mt-2 text-xs text-gray-500">
                💡 最短: ${state.minStops}停留所経由
              </div>
            ` : ''}
          </div>

          ${state.routes.map((route, index) => renderRoute(route, index)).join('')}
        </div>
      `;
    }

    function renderRoute(route, index) {
      const isFirst = index === 0 && route.minutesToArrival >= 0;
      // 遠回り判定：最短ルートより4停留所以上多い場合
      const stopDiff = route.stops ? route.stops.length - state.minStops : 0;
      const isDetour = stopDiff >= 4;
      const isShortest = route.stops && route.stops.length === state.minStops;
      const isExpanded = state.expandedId === route.id;

      return `
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden ${isFirst ? 'ring-4 ring-yellow-400' : ''}">
          
          ${isFirst ? `
            <div class="bg-gradient-to-r from-yellow-400 to-orange-400 px-4 py-2 flex items-center gap-2">
              <svg class="w-4 h-4 text-white animate-pulse-slow" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
              <span class="text-white font-bold text-sm">おすすめ！次に乗れるバス</span>
            </div>
          ` : ''}

          ${isShortest && !isFirst ? `
            <div class="bg-green-50 border-b border-green-200 px-4 py-2 flex items-center gap-2">
              <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
              </svg>
              <span class="text-green-700 text-sm font-semibold">✨ 最短ルート（${route.stops.length}停留所経由）</span>
            </div>
          ` : ''}

          ${isDetour ? `
            <div class="bg-orange-50 border-b border-orange-200 px-4 py-2 flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <span class="text-orange-600 text-sm font-semibold">⚠️ 遠回りルート（${route.stops.length}停留所経由・最短より+${stopDiff}停留所）</span>
            </div>
          ` : ''}

          <div class="p-5">
            
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xl shadow">
                  ${route.route_number}
                </div>
                <div>
                  <div class="font-bold text-gray-800 text-sm">${route.route_name}</div>
                  <div class="text-xs text-gray-500">${route.company}</div>
                </div>
              </div>
            </div>

            ${route.activeDayType !== state.dayType ? `
              <div class="mb-3 bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm">
                <div class="flex items-center gap-2 text-amber-700">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                  </svg>
                  <span class="font-semibold">${getDayTypeLabel(route.activeDayType)}ダイヤで運行</span>
                </div>
              </div>
            ` : ''}

            <div class="rounded-xl p-4 mb-4 ${isFirst ? 'bg-yellow-50 border-2 border-yellow-300' : 'bg-blue-50'}">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <div class="text-xs text-gray-500 mb-1 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                    </svg>
                    次の発車時刻
                  </div>
                  <div class="text-2xl font-bold ${isFirst ? 'text-orange-500' : 'text-blue-600'}">
                    ${route.nextDeparture}
                  </div>
                  <div class="text-xs ${isFirst ? 'text-orange-600' : 'text-gray-500'} mt-1 font-semibold">
                    ${getArrivalText(route.minutesToArrival)}
                  </div>
                </div>
                <div>
                  <div class="text-xs text-gray-500 mb-1 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                    </svg>
                    到着予定時刻
                  </div>
                  <div class="text-2xl font-bold ${isFirst ? 'text-orange-500' : 'text-blue-600'}">
                    ${route.nextArrival || '-'}
                  </div>
                </div>
              </div>
            </div>

            <a href="https://www.busnavi-okinawa.com/" target="_blank" class="w-full flex items-center justify-center gap-2 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-3 rounded-xl mb-3 transition-colors border border-green-200">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              </svg>
              リアルタイム位置を見る
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>

            <button onclick="toggleExpanded('${route.id}')" class="w-full flex items-center justify-center gap-2 text-gray-500 hover:text-gray-700 text-sm py-2">
              ${isExpanded ? 
                `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>経由バス停を隠す` : 
                `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>経由バス停を確認（${route.stops ? route.stops.length : 0}停留所）`
              }
            </button>

            ${isExpanded && route.stops ? `
              <div class="mt-3 pt-3 border-t border-gray-100">
                ${route.stops.map((stop, idx) => `
                  <div class="flex items-start gap-3 mb-1">
                    <div class="flex flex-col items-center pt-1">
                      <div class="w-3 h-3 rounded-full flex-shrink-0 ${
                        idx === 0 ? 'bg-green-500' :
                        idx === route.stops.length - 1 ? 'bg-red-500' : 'bg-gray-300'
                      }"></div>
                      ${idx < route.stops.length - 1 ? '<div class="w-0.5 h-5 bg-gray-200 mt-0.5"></div>' : ''}
                    </div>
                    <div class="pb-1 text-sm ${
                      idx === 0 || idx === route.stops.length - 1 ? 'font-bold text-gray-800' : 'text-gray-500'
                    }">
                      ${stop}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ==========================================
    // 初期化
    // ==========================================
    setInterval(() => {
      state.currentTime = new Date();
      state.dayType = getDayType(state.currentTime);
      render();
    }, 30000); // 30秒ごとに更新

    render();
  </script>
</body>
</html>
